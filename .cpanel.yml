---
deployment:
  tasks:
    # Definir ruta destino
    - export DEPLOYPATH=/home/$USER/public_html

    # Copiar archivos del repositorio al public_html
    - /bin/cp -R . $DEPLOYPATH

    # Asegurar que el .htaccess raíz esté en su lugar
    - /bin/cp $DEPLOYPATH/.htaccess $DEPLOYPATH/.htaccess.bak 2>/dev/null || true

    # Instalar dependencias de Composer (sin dev) con memoria suficiente
    - cd $DEPLOYPATH && /usr/local/bin/php -d memory_limit=-1 /usr/local/bin/composer install --no-dev --optimize-autoloader --no-interaction

    # Optimizar Laravel para producción con memoria suficiente
    - cd $DEPLOYPATH && /usr/local/bin/php -d memory_limit=256M artisan config:cache
    - cd $DEPLOYPATH && /usr/local/bin/php -d memory_limit=256M artisan route:cache
    - cd $DEPLOYPATH && /usr/local/bin/php -d memory_limit=256M artisan view:cache

    # Ejecutar migraciones con memoria suficiente
    - cd $DEPLOYPATH && /usr/local/bin/php -d memory_limit=256M artisan migrate --force

    # Crear enlace simbólico de storage con memoria suficiente
    - cd $DEPLOYPATH && /usr/local/bin/php -d memory_limit=256M artisan storage:link

    # Establecer permisos correctos
    - chmod -R 755 $DEPLOYPATH/storage
    - chmod -R 755 $DEPLOYPATH/bootstrap/cache
